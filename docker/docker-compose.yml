services:
  ec2-troubleshooter:
    # ── Image ────────────────────────────────────────────────────────────────
    # Option A: use a pre-built image loaded from tar or pulled from ECR
    image: ${IMAGE:-ec2-troubleshooter:latest}

    # Option B: build locally (comment out 'image' above and uncomment below)
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile.offline   # use Dockerfile for online builds

    container_name: ec2-troubleshooter
    restart: unless-stopped

    # ── Port ─────────────────────────────────────────────────────────────────
    ports:
      - "${API_PORT:-8080}:8080"

    # ── Configuration ─────────────────────────────────────────────────────────
    # Mount your .env file — keeps secrets out of the compose file
    env_file:
      - ../.env                   # adjust path if .env lives elsewhere

    # Any env vars here override the .env file values
    environment:
      PYTHONUNBUFFERED: "1"
      LOG_FORMAT: json

    # ── AWS credentials ───────────────────────────────────────────────────────
    # The container inherits the EC2 instance role automatically via the
    # metadata service (169.254.169.254).  No credential files are needed.
    # If you use ~/.aws/credentials instead, uncomment:
    # volumes:
    #   - ${HOME}/.aws:/home/appuser/.aws:ro

    # ── Logging ───────────────────────────────────────────────────────────────
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

    # ── Health check ──────────────────────────────────────────────────────────
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
