version: "3.9"

services:
  ec2-troubleshooter:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ec2-troubleshooter:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # ── AWS ───────────────────────────────────────────────────────────
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # Use an EC2 instance role in production; credentials are auto-discovered.

      # ── Air-gapped VPC endpoint overrides ─────────────────────────────
      # Uncomment and fill in when running in a fully air-gapped VPC.
      # USE_VPC_ENDPOINTS: "true"
      # VPC_ENDPOINT_EC2: https://vpce-XXXX.ec2.${AWS_REGION}.vpce.amazonaws.com
      # VPC_ENDPOINT_SSM: https://vpce-XXXX.ssm.${AWS_REGION}.vpce.amazonaws.com
      # VPC_ENDPOINT_CLOUDWATCH: https://vpce-XXXX.monitoring.${AWS_REGION}.vpce.amazonaws.com
      # VPC_ENDPOINT_STS: https://vpce-XXXX.sts.${AWS_REGION}.vpce.amazonaws.com

      # ── Reporter ──────────────────────────────────────────────────────
      REPORTER_TYPE: ${REPORTER_TYPE:-log}
      REPORTER_GCHAT_WEBHOOK_URL: ${REPORTER_GCHAT_WEBHOOK_URL:-}
      REPORTER_WEBHOOK_URL: ${REPORTER_WEBHOOK_URL:-}

      # ── API ───────────────────────────────────────────────────────────
      API_SECRET_TOKEN: ${API_SECRET_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: json

    # Mount a .env file for local dev only
    # env_file:
    #   - ../.env

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
